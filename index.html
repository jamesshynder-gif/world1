<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Digital Twin</title>
  <link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    .hud {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(10, 18, 34, 0.75); color: #fff; padding: 10px 12px;
      border-radius: 8px; backdrop-filter: blur(4px); max-width: 360px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .hud h1 { margin: 0 0 6px; font-size: 16px; }
    .hud p { margin: 0; font-size: 13px; line-height: 1.35; opacity: 0.9; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="hud">
    <h1>Interactive Earth Digital Twin</h1>
    <p>
      Drag to orbit Earth, scroll to zoom from space to city streets, and use <b>Ctrl/Cmd + drag</b>
      to tilt. Layers use free public OSM imagery, OpenMapTiles boundaries, and public terrain DEM.
    </p>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>
  <script>
    const style = {
      version: 8,
      sources: {
        osm: {
          type: 'raster',
          tiles: [
            'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
          ],
          tileSize: 256,
          attribution: '© OpenStreetMap contributors'
        },
        boundaries: {
          type: 'vector',
          url: 'https://demotiles.maplibre.org/tiles/tiles.json'
        },
        terrain: {
          type: 'raster-dem',
          url: 'https://demotiles.maplibre.org/terrain-tiles/tiles.json',
          tileSize: 256
        }
      },
      layers: [
        { id: 'osm', type: 'raster', source: 'osm' },
        {
          id: 'country-lines',
          type: 'line',
          source: 'boundaries',
          'source-layer': 'boundary',
          paint: {
            'line-color': '#dbe4ff',
            'line-width': ['interpolate', ['linear'], ['zoom'], 0, 0.2, 5, 0.7, 10, 1.2],
            'line-opacity': 0.5
          }
        }
      ],
      terrain: { source: 'terrain', exaggeration: 1.15 },
      sky: {}
    };

    const map = new maplibregl.Map({
      container: 'map',
      style,
      center: [0, 20],
      zoom: 1.6,
      pitch: 35,
      bearing: 0,
      hash: true,
      antialias: true,
      maxZoom: 18,
      minZoom: 0.7,
      renderWorldCopies: false
    });

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
    map.addControl(new maplibregl.FullscreenControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

    map.on('style.load', () => {
      map.setProjection({ type: 'globe' });
      map.setFog({
        color: 'rgb(186, 210, 235)',
        'high-color': 'rgb(36, 92, 223)',
        'horizon-blend': 0.14,
        'space-color': 'rgb(6, 12, 28)',
        'star-intensity': 0.25
      });
      map.setMaxPitch(85);
      map.easeTo({ zoom: 1.3, duration: 1200 });
    });

    // Adaptive quality for smoother performance on regular devices.
    map.on('moveend', () => {
      const z = map.getZoom();
      map.setTerrain({
        source: 'terrain',
        exaggeration: z > 11 ? 1.0 : 1.15
      });
    });
  </script>
</body>
</html>
